name: Nightly Test run (Jahia RL)

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 1 * * *'

jobs:
  integration-tests-rl:
    name: Integration Tests (Jahia-RL)
    secrets: inherit
    uses: Jahia/jahia-modules-action/.github/workflows/reusable-integration-tests.yml@v2
    with:
      module_id: copy-to-other-languages
      module_branch: main
      jahia_image: jahia/jahia-ee:8
      provisioning_manifest: provisioning-manifest-snapshot.yml
      artifact_prefix: ctol-jahia-rl
      timeout_job: 45
      timeout_step: 20
      testrail_project: Copy to all languages Module
